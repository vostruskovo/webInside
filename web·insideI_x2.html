        }

        .system-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 20px;
            margin-bottom: 28px;
        }

        .system-header h1 {
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            color: #0b1a26;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .system-header h1 span {
            background: #1e2b39;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 80px;
            letter-spacing: 0.3px;
            background: #2c3e50;
        }

        .input-area {
            display: flex;

            box-shadow: 0 0 0 4px rgba(59, 110, 155, 0.15);
        }

        .input-area input {
            flex: 1;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            background: transparent;
            outline: none;
            color: #0e1f2b;
            font-weight: 450;
            min-width: 160px;
        }

        .input-area input::placeholder {
            color: #8b9aa8;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        .input-area button {
            background: #1e2f3f;
            border: none;
            padding: 10px 28px;
            border-radius: 80px;
            font-weight: 550;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;

            letter-spacing: 0.3px;
            box-shadow: 0 4px 8px rgba(0, 20, 30, 0.08);

        }

        .input-area button:hover {
            background: #123042;

            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .input-area button:active {
            transform: scale(0.94);
        }

        .hint {
            font-size: 0.85rem;
            color: #3f5565;
            background: rgba(0,0,0,0.02);
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #dde5ec;
            backdrop-filter: blur(2px);
        }

        .inject-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
            background: #eef4f9;
            padding: 10px 18px 10px 22px;
            border-radius: 60px;
            margin: 16px 0 18px 0;
            border: 1px solid #d0dce8;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);

        .inject-panel label {
            font-weight: 550;

        .inject-input-wrap:focus-within {

            border-radius: 60px;

            transition: 0.12s;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            letter-spacing: 0.2px;
        }

        .inject-btn:hover {
            background: #12323d;
            transform: scale(0.96);
        }

        .inject-btn:active {
            transform: scale(0.92);
        }

        .inject-clear {
            background: transparent;
            border: 1px solid #b8ccdb;
            color: #2d4a5c;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.8rem;

        .viewport-url:hover {
            background: #1a3140;
            border-color: #4a7a9a;

        .viewport-url .edit-hint {
            position: absolute;
            right: 12px;
            top: 50%;

            background: #2a4a5a;

        .viewport-url:hover .edit-hint {

        .viewport-url.editing {

            border-color: #5a9ac0;
            box-shadow: 0 0 0 3px rgba(70, 140, 200, 0.2);
        }

        .viewport-url input {
            background: transparent;
            border: none;
            color: #d6edff;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
            padding: 0;
            margin: 0;
            letter-spacing: 0.2px;
        }

        .viewport-url input::placeholder {
            color: #6a8fa5;
            font-weight: 300;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            background: #0b141c;
            height: 0;
            padding-bottom: 70%;
            min-height: 340px;
            overflow: hidden;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: white;

            justify-content: center;

            font-size: 1.1rem;

            text-align: center;

            z-index: 10;

        .fallback-msg .icon {
            font-size: 3.4rem;
            margin-bottom: 14px;
            opacity: 0.7;
        }

        .fallback-msg small {
            opacity: 0.7;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px 4px 16px;
            color: #889fb0;
            font-size: 0.8rem;
            background: #1d2b36;

        .status-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            background: #2b4050;
            padding: 2px 12px;
            border-radius: 30px;
            color: #d6e6f2;
        }

        .badge-success {
            background: #1a4a2a;
            color: #a0e0b0;
        }

        .badge-error {
            background: #5a2a2a;
            color: #ffb0b0;

        .badge-warning {
            background: #5a4a1a;
            color: #f0d080;
        }

        .delay-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #4a6a7a;
        }

        .delay-control input {
            width: 60px;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #cbd8e5;

            font-size: 0.8rem;

        @media (max-width: 700px) {
            .system-card { padding: 20px 16px; }
            .input-area { flex-wrap: wrap; background: transparent; padding: 0; gap: 10px; border: none; box-shadow: none; }

            .input-area button { width: 100%; justify-content: center; }
            .inject-panel { flex-direction: column; align-items: stretch; border-radius: 30px; padding: 16px; }
            .inject-input-wrap { padding-left: 16px; }
            .viewport-url { font-size: 0.7rem; }
            .viewport-url .edit-hint { display: none; }
            .inject-help { text-align: center; }
            .delay-control { justify-content: center; }
        }
    </style>
</head>

<script>
    (function() {
        "use strict";

        // DOM refs
        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const webFrame = document.getElementById('webFrame');
        const viewUrlContainer = document.getElementById('viewUrlDisplay');
        const urlDisplayText = document.getElementById('urlDisplayText');
        const fallbackMsg = document.getElementById('fallbackMsg');
        const statusText = document.getElementById('statusText');
        const frameInfo = document.getElementById('frameInfo');
        const timeStamp = document.getElementById('timeStamp');

        const injectInput = document.getElementById('injectInput');
        const injectBtn = document.getElementById('injectBtn');
        const injectClear = document.getElementById('injectClear');
        const delayInput = document.getElementById('delayInput');

        let currentUrl = 'https://thepiratebay.org/search.php?q=gt+a+%2B+pc&cat=0';
        let isEditing = false;
        let injectionTimeout = null;

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            timeStamp.textContent = '⏱ ' + timeStr;
        }
        updateTimestamp();
        setInterval(updateTimestamp, 10000);

        function prepareUrl(raw) {
            let url = raw.trim();
            if (!url) return null;
            
            if (url.toLowerCase().startsWith('javascript:')) {
                return url;
            }
            
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }
            try {
                const parsed = new URL(url);
                if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
                    return null;
                }
                return parsed.href;
            } catch (_) {
                return null;
            }
        }

        function formatDisplayUrl(url) {
            if (url && url.toLowerCase().startsWith('javascript:')) {
                return '⚡ ' + url.substring(0, 30) + (url.length > 30 ? '…' : '');
            }
            try {
                const urlObj = new URL(url);
                let host = urlObj.hostname;
                if (host.length > 30) host = host.substring(0, 28) + '…';
                return '🌐 ' + host;
            } catch (_) {
                return '🌐 ' + url.substring(0, 40);
            }
        }

        // ─── CORE: Execute JavaScript in iframe ──────────────────
        function executeJavaScriptInIframe(code, delay) {
            const iframe = document.getElementById('webFrame');
            const delayMs = parseInt(delay) || 1000;
            
            statusText.textContent = '⏳ injecting...';
            frameInfo.textContent = '⏳ waiting ' + delayMs + 'ms';
            frameInfo.className = 'badge badge-warning';
            
            // Clear any existing timeout
            if (injectionTimeout) {
                clearTimeout(injectionTimeout);
                injectionTimeout = null;
            }
            
            injectionTimeout = setTimeout(function() {
                try {
                    // Get the iframe's document
                    const doc = iframe.contentDocument || iframe.contentWindow?.document;
                    
                    if (!doc || !doc.documentElement) {
                        statusText.textContent = '⚠️ iframe not ready';
                        frameInfo.textContent = '⛔ not ready';
                        frameInfo.className = 'badge badge-error';
                        return;
                    }

                    // Check if document is fully loaded
                    if (doc.readyState !== 'complete' && doc.readyState !== 'interactive') {
                        statusText.textContent = '⏳ page still loading...';
                        frameInfo.textContent = '⏳ loading';
                        frameInfo.className = 'badge badge-warning';
                        // Try again after another delay
                        injectionTimeout = setTimeout(function() {
                            executeJavaScriptInIframe(code, 500);
                        }, 500);
                        return;
                    }

                    // Create and inject script
                    const script = doc.createElement('script');
                    script.textContent = code;
                    doc.body.appendChild(script);
                    
                    statusText.textContent = '✅ executed';
                    frameInfo.textContent = '🧪 injected';
                    frameInfo.className = 'badge badge-success';
                    
                    // Show notification in iframe
                    const notif = doc.createElement('div');
                    notif.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1a2a3a;color:#b0d8f0;padding:10px 20px;border-radius:12px;font-size:14px;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,0.6);border:1px solid #3a6a8a;font-family:Segoe UI,sans-serif;';
                    notif.textContent = '⚡ JavaScript executed with ' + delayMs + 'ms delay';
                    doc.body.appendChild(notif);
                    setTimeout(() => { try { notif.remove(); } catch(_) {} }, 3000);
                    
                } catch (e) {
                    // Cross-origin error - try alternative
                    statusText.textContent = '⚠️ cross-origin';
                    frameInfo.textContent = '⛔ CORS blocked';
                    frameInfo.className = 'badge badge-error';
                    
                    // Try using the iframe's window object
                    try {
                        const win = iframe.contentWindow;
                        if (win) {
                            win.eval(code);
                            statusText.textContent = '✅ executed (eval)';
                            frameInfo.textContent = '🧪 eval';
                            frameInfo.className = 'badge badge-warning';
                            return;
                        }
                    } catch(e2) {
                        // If all fails, try parent eval (last resort)
                        try {
                            eval(code);
                            statusText.textContent = '✅ executed (parent)';
                            frameInfo.textContent = '🧪 parent';
                            frameInfo.className = 'badge badge-warning';
                            return;
                        } catch(e3) {
                            statusText.textContent = '❌ failed';
                            frameInfo.textContent = '⚠️ error';
                            frameInfo.className = 'badge badge-error';
                            alert('Failed to execute JavaScript:\n' + e3.message);
                        }
                    }
                }
            }, delayMs);
        }

        function loadWebpage(rawUrl) {
            const clean = prepareUrl(rawUrl);
            if (!clean) {
                statusText.textContent = '⚠️ invalid link';
                urlDisplayText.textContent = '❌ invalid URL';
                webFrame.src = 'about:blank';
                fallbackMsg.style.display = 'flex';
                fallbackMsg.innerHTML = `
                    <div class="icon">🚫</div>
                    <div>Invalid link or unsupported protocol</div>
                    <small>use http://, https://, or javascript:</small>
                `;
                frameInfo.textContent = '⬡ error';
                frameInfo.className = 'badge badge-error';
                currentUrl = '';
                return;
            }

            if (clean.toLowerCase().startsWith('javascript:')) {
                const jsCode = clean.substring('javascript:'.length);
                executeJavaScriptInIframe(jsCode, delayInput.value);
                urlDisplayText.textContent = formatDisplayUrl(clean);
                return;
            }

            currentUrl = clean;
            urlInput.value = clean;
            urlDisplayText.textContent = formatDisplayUrl(clean);

            fallbackMsg.style.display = 'flex';
            fallbackMsg.innerHTML = `
                <div class="icon">⏳</div>
                <div>Loading page …</div>
                <small>${clean}</small>
            `;

            webFrame.src = clean;
            statusText.textContent = 'loading …';
            frameInfo.textContent = '⏳ connecting';
            frameInfo.className = 'badge';
        }

        function onIframeLoad() {
            const src = webFrame.src;
            if (!src || src === 'about:blank') {
                fallbackMsg.style.display = 'flex';
                fallbackMsg.innerHTML = `
                    <div class="icon">🖥️</div>
                    <div>Paste a link above &amp; press <strong>Load page</strong></div>
                    <small>click the URL in the header to edit</small>
                `;
                statusText.textContent = 'idle';
                frameInfo.textContent = '⬡ iframe';
                frameInfo.className = 'badge';
                return;
            }

            let canAccess = false;
            try {
                const doc = webFrame.contentDocument || webFrame.contentWindow?.document;
                if (doc && doc.documentElement) {
                    canAccess = true;
                }
            } catch (_) {
                canAccess = false;
            }

            fallbackMsg.style.display = 'none';
            statusText.textContent = '✅ loaded';
            frameInfo.textContent = canAccess ? '📄 live' : '📄 loaded (CORS)';
            frameInfo.className = 'badge' + (canAccess ? ' badge-success' : '');
            
            if (src !== currentUrl && !src.toLowerCase().startsWith('javascript:')) {
                currentUrl = src;
                urlDisplayText.textContent = formatDisplayUrl(src);
                urlInput.value = src;
            }
        }

        function onIframeError() {
            fallbackMsg.style.display = 'flex';
            fallbackMsg.innerHTML = `
                <div class="icon">⚠️</div>
                <div>Failed to load page</div>
                <small>check the link or network</small>
            `;
            statusText.textContent = '❌ error';
            frameInfo.textContent = '⬡ blocked';
            frameInfo.className = 'badge badge-error';
        }

        webFrame.addEventListener('load', onIframeLoad);
        webFrame.addEventListener('error', onIframeError);

        function handleLoad() {
            const raw = urlInput.value.trim();
            if (!raw) {
                statusText.textContent = '⚠️ enter a link';
                return;
            }
            loadWebpage(raw);
        }

        loadBtn.addEventListener('click', handleLoad);
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLoad();
            }
        });

        // ─── CLICK TO EDIT URL ────────────────────────────────────
        function enterEditMode() {
            if (isEditing) return;
            isEditing = true;
            viewUrlContainer.classList.add('editing');

            let editValue = currentUrl || '';
            if (!editValue) {
                editValue = urlDisplayText.textContent.replace(/^[^\s]+\s+/, '');
            }

            const input = document.createElement('input');
            input.type = 'text';
            input.value = editValue;
            input.placeholder = 'https://example.com or javascript:alert("ok")';
            input.autofocus = true;

            urlDisplayText.textContent = '';
            urlDisplayText.appendChild(input);
            input.select();

            function finishEdit(apply) {
                if (!isEditing) return;
                isEditing = false;
                viewUrlContainer.classList.remove('editing');

                const newVal = input.value.trim();
                if (apply && newVal) {
                    loadWebpage(newVal);
                } else {
                    urlDisplayText.textContent = formatDisplayUrl(currentUrl || '');
                }
                input.remove();
            }

            input.addEventListener('blur', () => finishEdit(true));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    finishEdit(false);
                }
            });
        }

        viewUrlContainer.addEventListener('click', (e) => {
            if (e.target.tagName === 'INPUT') return;
            enterEditMode();
        });

        // ─── INJECT CODE ──────────────────────────────────────────
        function handleInject() {
            let code = injectInput.value.trim();
            if (!code) {
                statusText.textContent = '⚠️ enter code to inject';
                return;
            }

            if (code.toLowerCase().startsWith('javascript:')) {
                const jsCode = code.substring('javascript:'.length);
                executeJavaScriptInIframe(jsCode, delayInput.value);
                return;
            }

            const src = webFrame.src;
            if (!src || src === 'about:blank' || src === '') {
                statusText.textContent = '⚠️ load a page first';
                return;
            }
            if (fallbackMsg.style.display !== 'none') {
                statusText.textContent = '⏳ page not ready';
                return;
            }
            
            executeJavaScriptInIframe(code, delayInput.value);
        }

        injectBtn.addEventListener('click', handleInject);
        injectInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleInject();
            }
        });

        injectClear.addEventListener('click', () => {
            injectInput.value = '';
            injectInput.focus();
            statusText.textContent = 'cleared';
        });

        // ─── startup ──────────────────────────────────────────────
        window.addEventListener('load', function() {
            const defaultUrl = 'https://thepiratebay.org/search.php?q=gt+a+%2B+pc&cat=0';
            if (urlInput.value === defaultUrl || urlInput.value === '') {
                loadWebpage(defaultUrl);
            } else {
                const val = urlInput.value.trim();
                if (val) loadWebpage(val);
            }
        });

        fallbackMsg.addEventListener('click', function() {
            urlInput.focus();
        });

        console.log('🖥️ Webpage-inside-system · fixed injector with delay');
    })();
</script>

</body>
